version: '3.8'

services:
  nexus-db:
    image: postgres:15-alpine
    container_name: nexus-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: nexusdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  nexus-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://admin:mysecretpassword@nexus-db:5432/nexusdb
    depends_on:
      - nexus-db

volumes:
  pgdata:
