name: CI/CD Pipeline (Local WSL)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build and Deploy with Docker Compose
        run: |
          docker-compose down
          docker-compose up -d --build
          
      - name: Run Database Migrations
        run: |
          docker exec nexus-frontend npx prisma db push
